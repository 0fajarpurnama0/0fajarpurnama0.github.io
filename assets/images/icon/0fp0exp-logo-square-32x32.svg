    <polygon points="25.2,13.6 24.8,19.2 25.76,18.24 26.16,12.64" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="24.8,19.2 26,22.4 26.96,21.44 25.76,18.24" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
