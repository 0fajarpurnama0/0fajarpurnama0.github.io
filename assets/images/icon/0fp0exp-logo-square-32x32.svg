<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#000000" />

  <!-- ================= BACKGROUND THUNDER SYMBOLS ================= -->
  <g id="bolts">
    <defs>
      <!-- Defined and scaled classic bolt master shape -->
      <polygon id="lightning-bolt" points="-1.6,-10.4 2.4,-10.4 -0.8,0.8 2,0.8 -2.4,11.2 0,2.4 -2.8,2.4" />
    </defs>

    <!-- Bolt Shadows (scaled from 1.2 to 1.8 and positioned) -->
    <use href="#lightning-bolt" fill="#E69500" transform="translate(16.8, 17.2) rotate(45) scale(1.8)" />
    <use href="#lightning-bolt" fill="#E69500" transform="translate(16.8, 17.2) rotate(-45) scale(1.8)" />

    <!-- Bolt Fronts (scaled from 1.2 to 1.8 and positioned) -->
    <use href="#lightning-bolt" fill="#FFE600" transform="translate(16, 16) rotate(45) scale(1.8)" />
    <use href="#lightning-bolt" fill="#FFE600" transform="translate(16, 16) rotate(-45) scale(1.8)" />
  </g>

  <!-- ================= TEXT: 0 (LEFT) ================= -->
  <!-- Left 0 is now completely visible in this space -->
  <g id="text-0-left">
    <!-- 3D Backing/Extrusion Panels -->
    <polygon points="3.6,8.8 6.8,6.4 5.84,5.44 2.64,7.84" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="3.6,8.8 2.8,20 1.84,19.04 2.64,7.84" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="2.8,20 5.2,24 4.24,23.04 1.84,19.04" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="7.6,11.2 7.2,19.2 6.24,18.24 6.64,10.24" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="7.2,19.2 5.6,20.8 4.64,19.84 6.24,18.24" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="6.8,8.8 7.6,11.2 6.64,10.24 5.84,7.84" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <!-- Back Base Path -->
    <path d="M 2.64,7.84 L 5.84,5.44 L 8.24,9.44 L 7.44,19.84 L 4.24,23.04 L 1.84,19.04 Z M 4.24,9.44 L 3.44,16.64 L 4.64,19.84 L 6.24,18.24 L 6.64,10.24 L 5.84,7.84 Z" fill="#D4E157" fill-rule="evenodd" />
    <!-- Front Face -->
    <path d="M 3.6,8.8 L 6.8,6.4 L 9.2,10.4 L 8.4,20.8 L 5.2,24 L 2.8,20 Z M 5.2,10.4 L 4.4,17.6 L 5.6,20.8 L 7.2,19.2 L 7.6,11.2 L 6.8,8.8 Z" fill="#8CC63F" fill-rule="evenodd" stroke="#8CC63F" stroke-width="0.08" />
  </g>

  <!-- ================= TEXT: F ================= -->
  <g id="text-f">
    <polygon points="10,8.8 16.4,8 17.36,7.04 10.96,7.84" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="16.4,8 16.8,10 17.76,9.04 17.36,7.04" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="15.6,12.4 16,14.4 16.96,13.44 16.56,11.44" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
