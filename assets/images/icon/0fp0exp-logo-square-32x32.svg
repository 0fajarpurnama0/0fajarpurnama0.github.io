    <polygon points="16.8,16.4 15.6,23.2 16.56,22.24 17.76,15.44" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="18.4,11.2 17.6,14.4 18.56,13.44 19.36,10.24" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="17.6,14.4 19.6,14 20.56,13.04 18.56,13.44" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <path d="M 18.16,8.24 L 22.16,7.84 L 24.56,9.44 L 24.16,13.44 L 21.36,15.04 L 17.76,15.44 L 16.56,22.24 L 14.16,22.64 Z M 19.36,10.24 L 18.56,13.44 L 20.56,13.04 L 22.56,11.44 L 21.76,9.84 Z" fill="#D4E157" fill-rule="evenodd" />
    <path d="M 17.2,9.2 L 21.2,8.8 L 23.6,10.4 L 23.2,14.4 L 20.4,16 L 16.8,16.4 L 15.6,23.2 L 13.2,23.6 Z M 18.4,11.2 L 17.6,14.4 L 19.6,14 L 21.6,12.4 L 20.8,10.8 Z" fill="#8CC63F" fill-rule="evenodd" stroke="#8CC63F" stroke-width="0.08" />
  </g>

  <!-- ================= TEXT: 0 (RIGHT) ================= -->
  <g id="text-0-right">
    <polygon points="23.6,12 26,10.4 26.96,9.44 24.56,11.04" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="26,10.4 29.2,12.8 30.16,11.84 26.96,9.44" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
    <polygon points="29.2,12.8 28.4,22.4 29.36,21.44 30.16,11.84" fill="#D4E157" stroke="#D4E157" stroke-width="0.08" />
