    <path d="M 23.6,12 L 26,10.4 L 29.2,12.8 L 28.4,22.4 L 26,24.8 L 23.6,21.6 Z M 25.2,13.6 L 24.8,19.2 L 26,22.4 L 27.2,20.8 L 27.6,14.4 L 26.8,12.8 Z" fill="#8CC63F" fill-rule="evenodd" stroke="#8CC63F" stroke-width="0.08" />
