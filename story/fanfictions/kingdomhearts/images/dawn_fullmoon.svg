<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="voidBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#150a21" />
      <stop offset="80%" stop-color="#0b0514" />
      <stop offset="100%" stop-color="#020005" />
    </radialGradient>

    <linearGradient id="dawnGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff3c00" />
      <stop offset="60%" stop-color="#ffaa00" />
      <stop offset="100%" stop-color="#ffffaa" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="moonSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <filter id="auraBlur" x="-30%" y="-30%" width="160%" height="160%">
