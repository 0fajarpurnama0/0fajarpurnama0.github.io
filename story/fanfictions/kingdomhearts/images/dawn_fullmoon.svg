    <path d="M 250,80 C 340,80 410,150 410,250 C 410,320 320,410 250,410 C 160,410 90,340 90,250 C 90,160 160,80 250,80 Z" fill="none" stroke="#000000" stroke-width="20" />
    <path d="M 210,100 C 310,70 390,180 360,270 C 320,360 180,420 130,320 C 90,240 130,120 210,100 Z" fill="none" stroke="#2d004d" stroke-width="15" />
  </g>

