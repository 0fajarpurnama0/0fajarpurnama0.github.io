<nav>
    <button style="cursor: pointer;" class="menu" onclick="showing_navigation_menu()">&#8801;</button>
    <a href="{{ site.url }}" class="menu">&#127969;</a>
    <a href="{{ site.url }}/{{ page.categories }}" class="menu">&#128281;</a>

    {% for item in site.data.navigation %}
        {% if item.children %}
            <!-- Parent item with submenu -->
            <div class="menu-pill-container item-with-submenu">
                <!-- Javascript onclick uses # as link, prevents default -->
                <a href="#" class="menu parent-toggle" onclick="toggleSubmenu(event, this)">
                    {{ item.name }}
                    <span class="indicator">&#9662;</span> <!-- Down caret -->
                </a>
                
                <!-- The animated submenu -->
                <div class="submenu">
                    {% for child in item.children %}
                        <a href="{{ site.baseurl }}{{ child.link }}" class="menu child-link">
                            {{ child.name }}
                        </a>
                    {% endfor %}
                </div>
            </div>
        {% else %}
            <!-- Simple, flat menu item -->
            <a href="{{ site.baseurl }}{{ item.link }}" class="menu standalone-link">
                {{ item.name }}
            </a>
        {% endif %}
    {% endfor %}
</nav>

<!-- JavaScript required for touch/click interaction -->
<script>
function toggleSubmenu(event, element) {
    // 1. Prevent the page from jumping up (default anchor behavior for href="#")
    event.preventDefault();
    
    // 2. Find the wrapper div (item-with-submenu) for this specific button
    const container = element.parentElement;
    
    // 3. Toggle the active class which controls visibility and indicator animation
    container.classList.toggle("is-active");

    // Optional: Close other open submenus if you want accordion behavior
    // document.querySelectorAll('.item-with-submenu').forEach(other => {
    //     if (other !== container) {
    //         other.classList.remove('is-active');
    //     }
    // });
}
</script>
